<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backlog Editor</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f1117;
  color: #e2e8f0;
  min-height: 100vh;
}

/* ── Header ── */
.app-header {
  background: linear-gradient(135deg, #0a0a14 0%, #0f172a 100%);
  color: white;
  padding: 18px 32px;
  border-bottom: 1px solid #1e293b;
}
.app-header h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 3px; }
.app-header p { font-size: 0.78rem; opacity: 0.4; }

/* ── Toolbar ── */
.toolbar {
  background: #151821;
  padding: 10px 32px;
  border-bottom: 1px solid #1e293b;
  display: flex;
  gap: 8px;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.btn {
  padding: 7px 16px;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-primary { background: #2563eb; color: white; }
.btn-primary:hover { background: #3b82f6; box-shadow: 0 3px 14px rgba(59,130,246,0.4); transform: translateY(-1px); }
.btn-secondary { background: #1e293b; color: #cbd5e1; border: 1px solid #334155; }
.btn-secondary:hover { background: #263347; border-color: #475569; }
.toolbar-hint { margin-left: auto; font-size: 0.74rem; color: #475569; }
.search-wrap { position: relative; display: flex; align-items: center; }
.search-icon { position: absolute; left: 9px; color: #475569; font-size: 0.82rem; pointer-events: none; }
.search-input {
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 7px;
  color: #e2e8f0;
  font-size: 0.82rem;
  padding: 6px 28px 6px 30px;
  width: 200px;
  outline: none;
  transition: border-color 0.15s, width 0.2s;
}
.search-input:focus { border-color: #3b82f6; width: 260px; }
.search-input::placeholder { color: #475569; }
.search-clear { position: absolute; right: 8px; background: none; border: none; color: #475569; cursor: pointer; font-size: 1rem; padding: 0; line-height: 1; display: none; }
.search-clear.visible { display: block; color: #94a3b8; }
.search-clear:hover { color: #e2e8f0; }
mark.hl { background: #78350f; color: #fef3c7; border-radius: 2px; padding: 0 1px; }
/* ── Tags ─────────────────────────────────────────────────────────────────── */
.tag-chip { display:inline-flex; align-items:center; gap:2px; font-size:0.68rem; font-weight:700; font-family:'Courier New',monospace; background:#0e2a3e; border:1px solid #1d4e6b; color:#38bdf8; padding:1px 7px 1px 5px; border-radius:10px; cursor:pointer; white-space:nowrap; transition:background 0.12s,border-color 0.12s; user-select:none; }
.tag-chip:hover { background:#0e3a58; border-color:#38bdf8; }
.tag-remove { background:none; border:none; color:#38bdf8; cursor:pointer; font-size:0.6rem; padding:0 0 0 2px; line-height:1; opacity:0.5; vertical-align:middle; }
.tag-remove:hover { opacity:1; color:#f87171; }
.tag-add-btn { background:none; border:1px dashed #334155; color:#475569; font-size:0.68rem; padding:1px 6px; border-radius:8px; cursor:pointer; line-height:1.6; flex-shrink:0; transition:all 0.12s; }
.tag-add-btn:hover { border-color:#38bdf8; color:#38bdf8; background:rgba(56,189,248,0.06); }
.tag-input-inline { font-family:'Courier New',monospace; font-size:0.75rem; background:#0f172a; border:1px solid #38bdf8; border-radius:6px; color:#38bdf8; padding:2px 7px; outline:none; width:80px; }
.item-tags { display:flex; flex-wrap:wrap; gap:3px; align-items:center; flex-shrink:0; margin-left:2px; }
.bucket-tags { display:flex; flex-wrap:wrap; gap:3px; align-items:center; margin:0 4px; }
.btn-ghost { background: none; color: #64748b; border: 1px solid #334155; font-size: 0.76rem; padding: 5px 10px; }
.btn-ghost:hover { color: #cbd5e1; border-color: #475569; background: rgba(255,255,255,0.06); transform: none; box-shadow: none; }
.toolbar-sep { width: 1px; height: 20px; background: #1e293b; flex-shrink: 0; margin: 0 2px; }
.view-toggle { display: flex; gap: 2px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 2px; }
.view-toggle .btn-view { background: none; border: none; color: #64748b; font-size: 0.76rem; font-weight: 600; padding: 4px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.view-toggle .btn-view.active { background: #1e293b; color: #e2e8f0; }
.view-toggle .btn-view:hover:not(.active) { color: #94a3b8; }
/* Priority view */
.pv-group { margin-bottom: 18px; }
.pv-group-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #151821; border-radius: 8px; cursor: pointer; user-select: none; margin-bottom: 4px; border: 1px solid #1e293b; }
.pv-group-header:hover { background: #1a2030; }
.pv-group-title { font-size: 0.85rem; font-weight: 700; color: #e2e8f0; flex: 1; }
.pv-group-count { font-size: 0.7rem; color: #64748b; background: #0f172a; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
.pv-group-chevron { color: #475569; font-size: 0.65rem; transition: transform 0.2s; }
.pv-group.open .pv-group-chevron { transform: rotate(90deg); }
.pv-items { display: none; padding: 4px 0 8px 0; }
.pv-group.open .pv-items { display: block; }
.pv-item { display: flex; align-items: flex-start; gap: 9px; padding: 8px 12px; border-radius: 7px; transition: background 0.1s; background: #1a1f2e; border: 1px solid #1e293b; margin-bottom: 4px; }
.pv-item:hover { background: #1e2538; border-color: #2d3f5e; }
.pv-item.na-item { opacity: 0.5; }
.pv-item.na-item .pv-item-text { text-decoration: line-through; color: #64748b; }
.pv-item-text { flex: 1; font-size: 0.92rem; line-height: 1.6; color: #cbd5e1; }
.pv-bucket-tag { font-size: 0.75rem; color: #94a3b8; background: #0f172a; border: 1px solid #334155; padding: 3px 10px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }

/* ── Container ── */
#buckets-container {
  max-width: 880px;
  margin: 22px auto;
  padding: 0 20px 80px;
}

/* ── Bucket Card ── */
.bucket-card {
  background: #1a1f2e;
  border-radius: 10px;
  margin-bottom: 9px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  border-left: 5px solid #334155;
  transition: box-shadow 0.2s;
  overflow: hidden;
}
.bucket-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.bucket-card.priority-critical { border-left-color: #ef4444; }
.bucket-card.priority-medium  { border-left-color: #f59e0b; }
.bucket-card.priority-low     { border-left-color: #3b82f6; }

/* ── Bucket Header ── */
.bucket-header {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  gap: 9px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}
.bucket-header:hover { background: rgba(255,255,255,0.04); }

.bucket-drag-handle {
  color: #334155;
  cursor: grab;
  font-size: 1.1rem;
  flex-shrink: 0;
  padding: 2px 3px;
  border-radius: 4px;
  line-height: 1;
  transition: color 0.12s;
}
.bucket-drag-handle:hover { color: #64748b; background: rgba(255,255,255,0.06); }
.bucket-drag-handle:active { cursor: grabbing; }

.bucket-number {
  font-size: 0.68rem;
  color: #475569;
  min-width: 22px;
  font-weight: 700;
  font-family: 'Courier New', monospace;
}
.priority-select {
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 3px 5px;
  font-size: 0.76rem;
  cursor: pointer;
  background: #0f172a;
  color: #cbd5e1;
  font-weight: 500;
}
.priority-select:focus { outline: none; border-color: #3b82f6; }

.item-priority-select {
  border: 1px solid #1e293b;
  border-radius: 5px;
  padding: 2px 3px;
  font-size: 0.7rem;
  cursor: pointer;
  background: #0f172a;
  color: #94a3b8;
  font-weight: 500;
  flex-shrink: 0;
  transition: all 0.12s;
}
.item-priority-select:hover, .item-priority-select:focus {
  outline: none; border-color: #3b82f6; color: #cbd5e1;
}
.item-row.na-item {
  opacity: 0.55;
}
.item-row.na-item .item-text {
  text-decoration: line-through;
  color: #64748b;
}

.bucket-title {
  flex: 1;
  font-weight: 600;
  font-size: 0.9rem;
  color: #e2e8f0;
  cursor: text;
}
.bucket-title-input {
  flex: 1;
  font-weight: 600;
  font-size: 0.9rem;
  border: 1.5px solid #3b82f6;
  border-radius: 5px;
  padding: 2px 8px;
  outline: none;
  font-family: inherit;
  background: #0f172a;
  color: #e2e8f0;
}
.item-count-badge {
  font-size: 0.7rem;
  color: #64748b;
  background: #0f172a;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 700;
  flex-shrink: 0;
}
.rename-bucket-btn, .delete-bucket-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 0.85rem;
  padding: 3px 6px;
  border-radius: 5px;
  transition: all 0.12s;
  flex-shrink: 0;
}
.rename-bucket-btn { color: #334155; }
.rename-bucket-btn:hover { color: #60a5fa; background: rgba(96,165,250,0.12); }
.delete-bucket-btn { color: #334155; }
.delete-bucket-btn:hover { color: #ef4444; background: rgba(239,68,68,0.12); }

.chevron {
  color: #475569;
  font-size: 0.65rem;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.bucket-card.expanded .chevron { transform: rotate(90deg); }

/* ── Bucket Body ── */
.bucket-body { display: none; padding: 0 14px 12px 14px; }
.bucket-card.expanded .bucket-body { display: block; }

/* ── Items ── */
.items-list { list-style: none; min-height: 8px; }
.item-row {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 5px 5px;
  border-radius: 6px;
  transition: background 0.1s;
}
.item-row:hover { background: rgba(255,255,255,0.04); }
.item-row:hover .item-actions { opacity: 1; }

.item-drag-handle {
  color: #2d3748;
  cursor: grab;
  flex-shrink: 0;
  padding-top: 2px;
  font-size: 0.9rem;
  line-height: 1;
  transition: color 0.12s;
}
.item-drag-handle:hover { color: #64748b; }
.item-drag-handle:active { cursor: grabbing; }

.item-text {
  flex: 1;
  font-size: 0.845rem;
  line-height: 1.55;
  color: #cbd5e1;
  cursor: text;
}
.item-text-input {
  flex: 1;
  font-size: 0.845rem;
  line-height: 1.55;
  border: 1.5px solid #3b82f6;
  border-radius: 5px;
  padding: 3px 7px;
  outline: none;
  font-family: inherit;
  background: #0f172a;
  color: #e2e8f0;
  resize: vertical;
  min-height: 30px;
}
.item-actions {
  display: flex;
  gap: 1px;
  opacity: 0;
  transition: opacity 0.12s;
  flex-shrink: 0;
  padding-top: 1px;
}
.item-edit-btn, .delete-item-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 0.75rem;
  padding: 3px 5px;
  border-radius: 4px;
  transition: all 0.12s;
  line-height: 1;
}
.item-edit-btn { color: #475569; }
.item-edit-btn:hover { color: #60a5fa; background: rgba(96,165,250,0.1); }
.delete-item-btn { color: #475569; }
.delete-item-btn:hover { color: #ef4444; background: rgba(239,68,68,0.12); }

/* ── Add Item ── */
.add-item-area {
  display: flex;
  gap: 7px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed #1e293b;
}
.add-item-input {
  flex: 1;
  border: 1px solid #334155;
  border-radius: 7px;
  padding: 6px 11px;
  font-size: 0.835rem;
  font-family: inherit;
  background: #0f172a;
  color: #e2e8f0;
  transition: border-color 0.15s;
}
.add-item-input::placeholder { color: #475569; }
.add-item-input:focus { outline: none; border-color: #3b82f6; background: #0a0f1e; }
.add-item-btn {
  background: rgba(37,99,235,0.15);
  border: 1px solid #2563eb;
  color: #60a5fa;
  padding: 6px 13px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  transition: all 0.12s;
  white-space: nowrap;
}
.add-item-btn:hover { background: rgba(37,99,235,0.3); border-color: #3b82f6; }

/* ── Sortable ── */
.sortable-ghost { opacity: 0.25; background: rgba(59,130,246,0.15) !important; border-radius: 8px; }
.sortable-drag { box-shadow: 0 16px 40px rgba(0,0,0,0.6) !important; transform: rotate(0.8deg) !important; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 26px;
  right: 26px;
  background: #1e293b;
  color: #e2e8f0;
  border: 1px solid #334155;
  padding: 11px 20px;
  border-radius: 9px;
  font-size: 0.85rem;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: none;
  z-index: 1000;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── Timeline View ─────────────────────────────────────────────────────────── */
.tl-view {
  background: #0a1628;
  min-height: calc(100vh - 140px);
  padding: 36px 40px 60px;
}
.tl-title-h2 {
  font-size: 2.4rem; font-weight: 800; color: #ffffff;
  cursor: pointer; line-height: 1.1; margin-bottom: 40px;
  user-select: none; display: inline-block;
}
.tl-title-h2:hover { opacity: 0.85; }
.tl-title-h2 .tl-t-light { font-weight: 300; color: #94a3b8; }
.tl-title-input {
  font-size: 2.4rem; font-weight: 800; color: #fff;
  background: transparent; border: none; border-bottom: 2px solid #3b82f6;
  outline: none; font-family: inherit; margin-bottom: 40px; display: block;
}
.tl-scroll-wrap { overflow-x: auto; overflow-y: visible; padding-bottom: 40px; -webkit-overflow-scrolling: touch; }
.tl-cols-row { display: inline-flex; min-width: 100%; position: relative; }
/* Horizontal timeline line — centre at meta(50px) + half-dot(9px) = 59px */
.tl-cols-row::before {
  content: ''; position: absolute; top: 59px;
  left: 60px; right: 60px; height: 2px;
  background: linear-gradient(90deg, #0ea5e9 0%, #38bdf8 50%, #7dd3fc 100%);
  z-index: 0; pointer-events: none;
}
.tl-col-unit { flex: 1 0 220px; max-width: 320px; display: flex; flex-direction: column; align-items: stretch; padding: 0 6px; }
/* ── Milestone header ── */
.tl-ms-header { display: flex; flex-direction: column; align-items: center; }
.tl-ms-meta { min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 6px; gap: 2px; text-align: center; }
.tl-ms-version { font-size: 0.75rem; font-weight: 700; color: #94a3b8; letter-spacing: 0.05em; cursor: pointer; transition: color 0.12s; }
.tl-ms-version:hover { color: #e2e8f0; }
.tl-ms-date { font-size: 0.72rem; color: #475569; cursor: pointer; transition: color 0.12s; }
.tl-ms-date:hover { color: #e2e8f0; }
.tl-ms-date.shipped { color: #4ade80; font-weight: 600; }
.tl-dot-row { height: 18px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
.tl-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 3px solid #7dd3fc; background: #0a1628;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative; z-index: 2;
}
.tl-dot:hover { transform: scale(1.35); box-shadow: 0 0 12px rgba(125,211,252,0.6); }
.tl-dot.shipped { background: #4ade80; border-color: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5); }
.tl-dot.shipped:hover { box-shadow: 0 0 16px rgba(74,222,128,0.8); }
.tl-dot.inflight { background: #38bdf8; border-color: #38bdf8; box-shadow: 0 0 8px rgba(56,189,248,0.4); }
.tl-dot.inflight:hover { box-shadow: 0 0 14px rgba(56,189,248,0.8); }
.tl-dot.planned { background: #0a1628; border-color: #7dd3fc; }
.tl-ms-label { min-height: 44px; padding: 8px 4px 0; font-size: 0.75rem; color: #64748b; text-align: center; line-height: 1.35; cursor: pointer; transition: color 0.12s; }
.tl-ms-label:hover { color: #e2e8f0; }
.tl-ms-label.shipped { color: #4ade80; }
.tl-ms-label.inflight { color: #38bdf8; }
.tl-pointer { width: 0; height: 0; margin: 0 auto; border-left: 9px solid transparent; border-right: 9px solid transparent; border-top: 9px solid transparent; border-bottom: 9px solid #071829; }
.tl-pointer.shipped { border-bottom-color: #041d0d; }
.tl-pointer.planned { border-bottom-color: #0b1c32; }
/* ── Column card ── */
.tl-card { flex: 1; padding: 14px 16px 18px; border: 1px solid #1e3a5f; border-top: 3px solid #38bdf8; }
.tl-card.shipped { background: #041d0d; border-color: #0d3321; border-top-color: #4ade80; }
.tl-card.inflight { background: #071829; border-color: #1e3a5f; border-top-color: #38bdf8; }
.tl-card.planned  { background: #0b1c32; border-color: #1a3050; border-top-color: #7dd3fc; }
.tl-badge {
  display: inline-flex; align-items: center; gap: 5px; font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.1em; padding: 3px 9px; border-radius: 4px; margin-bottom: 11px;
  cursor: pointer; user-select: none; transition: opacity 0.15s;
}
.tl-badge:hover { opacity: 0.7; }
.tl-badge.shipped { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.6); color: #4ade80; }
.tl-badge.inflight { background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.6); color: #38bdf8; }
.tl-badge.planned  { background: rgba(125,211,252,0.06); border: 1px solid rgba(125,211,252,0.4); color: #7dd3fc; }
.tl-card-title { font-size: 0.95rem; font-weight: 700; color: #f0f4f8; margin-bottom: 12px; line-height: 1.35; cursor: pointer; }
.tl-card-title:hover { color: #ffffff; }
.tl-card-title-input {
  font-size: 0.95rem; font-weight: 700; color: #f0f4f8;
  background: rgba(255,255,255,0.06); border: 1px solid #38bdf8; border-radius: 4px;
  padding: 3px 8px; outline: none; width: 100%; font-family: inherit; margin-bottom: 12px; display: block;
}
.tl-card-divider { height: 1px; background: #1e3a5f; margin: 0 -16px 10px; }
.tl-card-divider.shipped { background: #0d3321; }
.tl-card-divider.planned { background: #1a3050; }
.tl-item { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; font-size: 0.82rem; line-height: 1.4; }
.tl-icon { flex-shrink: 0; width: 12px; margin-top: 2px; font-size: 0.68rem; font-weight: 800; }
.tl-icon.ok   { color: #4ade80; }
.tl-icon.go   { color: #38bdf8; }
.tl-icon.soft { color: #475569; }
.tl-icon.na   { color: #334155; }
.tl-itext { color: #cbd5e1; flex: 1; }
.tl-itext.bold { color: #f0f4f8; font-weight: 600; }
.tl-itext.dim  { color: #4b5873; }
.tl-itext.strike { color: #334155; text-decoration: line-through; }
.tl-ibucket { font-size: 0.62rem; color: #2d4060; display: block; margin-top: 1px; }
.tl-empty { color: #2a3f5e; font-size: 0.78rem; padding: 4px 0; font-style: italic; }
.tl-add-ms { flex: 0 0 160px; display: flex; align-items: flex-start; padding: 0 8px; margin-top: 0; }
.tl-add-ms-btn {
  background: rgba(56,189,248,0.03); border: 1px dashed #1e3a5f; border-radius: 10px;
  color: #334155; cursor: pointer; font-size: 0.78rem; padding: 14px; text-align: center;
  width: 100%; transition: all 0.15s; min-height: 70px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px; margin-top: 120px;
}
.tl-add-ms-btn:hover { border-color: #38bdf8; color: #38bdf8; background: rgba(56,189,248,0.07); }
.tl-meta-inline-input {
  background: rgba(14,31,56,0.95); border: 1px solid #38bdf8; border-radius: 4px;
  color: #e2e8f0; padding: 2px 7px; outline: none; font-family: inherit;
  font-size: inherit; font-weight: inherit; max-width: 180px; box-sizing: border-box;
}
</style>
</head>
<body>

<header class="app-header">
  <h1>📋 Backlog Editor</h1>
  <p id="editor-subtitle">Drag to reorder · Double-click to edit · Save exports Markdown</p>
</header>

<div class="toolbar">
  <button class="btn btn-primary" onclick="saveAsMarkdown()">💾 Save</button>
  <button class="btn btn-secondary" onclick="saveAsNewFile()" title="Save to a different file">Save As…</button>
  <button class="btn btn-secondary" onclick="loadMarkdownFile()">📂 Load</button>
  <button class="btn btn-secondary" onclick="addBucket()">＋ Add Bucket</button>
  <button class="btn btn-secondary" onclick="exportSnapshot()" title="Export a read-only HTML snapshot for sharing">📤 Share snapshot</button>
  <span class="toolbar-sep"></span>
  <div class="view-toggle">
    <button id="btn-view-buckets" class="btn-view active" onclick="setView('buckets')" title="Group by bucket">☰ Buckets</button>
    <button id="btn-view-priority" class="btn-view" onclick="setView('priority')" title="Flat list ranked by priority">≡ Priority</button>
    <button id="btn-view-timeline" class="btn-view" onclick="setView('timeline')" title="Roadmap timeline by tag">◼ Timeline</button>
  </div>
  <span class="toolbar-sep"></span>
  <button class="btn btn-ghost" onclick="expandAll()" title="Expand all">▾ Expand all</button>
  <button class="btn btn-ghost" onclick="collapseAll()" title="Collapse all">▸ Collapse all</button>
  <span class="toolbar-sep"></span>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search-input" class="search-input" type="text" placeholder="Search items…" oninput="onSearchInput(this.value)" onkeydown="if(event.key==='Escape'){clearSearch()}">
    <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Clear search">✕</button>
  </div>
  <span class="toolbar-hint">Drag ⠿ to reorder · Click ✏ or double-click title to rename · Double-click item to edit · Hover item for actions</span>
</div>

<div id="buckets-container"></div>
<div class="toast" id="toast"></div>

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
let _id = 1000;
function uid() { return 's' + (++_id); }

let buckets = [];
let tagMeta = {};         // { tagId: { status, label, date, sublabel, colTitle, order } }
let roadmapTitle = 'Backlog';

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtItemText(text) {
  const idx = text.indexOf(':');
  if (idx < 1) return esc(text);
  return `<strong>${esc(text.slice(0, idx))}</strong>${esc(text.slice(idx))}`;
}

function highlightText(text, q) {
  const idx = text.toLowerCase().indexOf(q);
  if (idx < 0) return fmtItemText(text);
  const before = text.slice(0, idx);
  const match  = text.slice(idx, idx + q.length);
  const after  = text.slice(idx + q.length);
  // Apply bold-colon formatting around the highlighted span
  const full = before + '\x01' + match + '\x02' + after;
  const colonIdx = full.indexOf(':');
  if (colonIdx > 0 && colonIdx < full.indexOf('\x01')) {
    return `<strong>${esc(before.slice(0, colonIdx))}</strong>${esc(before.slice(colonIdx))}<mark class="hl">${esc(match)}</mark>${esc(after)}`;
  }
  return `${esc(before)}<mark class="hl">${esc(match)}</mark>${esc(after)}`;
}
function getBucket(id) { return buckets.find(b => b.id === id); }
function getCard(id) { return document.querySelector(`.bucket-card[data-id="${id}"]`); }

// ─── Toast ────────────────────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── View State ───────────────────────────────────────────────────────────────
let currentView = 'buckets';
let searchQuery = '';

function onSearchInput(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', searchQuery !== '');
  if (currentView === 'timeline') return;
  if (currentView === 'buckets') applyBucketSearch();
  else renderPriorityView();
}

function clearSearch() {
  searchQuery = '';
  const inp = document.getElementById('search-input');
  if (inp) { inp.value = ''; inp.focus(); }
  document.getElementById('search-clear').classList.remove('visible');
  if (currentView === 'timeline') return;
  if (currentView === 'buckets') applyBucketSearch();
  else renderPriorityView();
}

function applyBucketSearch() {
  const q = searchQuery;
  const isTagSearch = q.startsWith('#');
  const tagQ = isTagSearch ? q.slice(1).toLowerCase() : null;
  document.querySelectorAll('.bucket-card').forEach(card => {
    const bid = card.dataset.id;
    const bucket = getBucket(bid);
    let visibleCount = 0;
    card.querySelectorAll('.item-row').forEach(row => {
      const textEl = row.querySelector('.item-text');
      if (!textEl) return;
      const raw = textEl.dataset.raw || textEl.textContent;
      textEl.dataset.raw = raw;
      const item = bucket ? bucket.items.find(i => i.id === row.dataset.id) : null;
      let match;
      if (!q) {
        match = true;
      } else if (isTagSearch) {
        match = !!(item && (item.tags || []).some(t => t.toLowerCase().includes(tagQ)));
      } else {
        match = raw.toLowerCase().includes(q) || !!(item && (item.tags || []).some(t => t.toLowerCase().includes(q)));
      }
      row.style.display = match ? '' : 'none';
      if (match) {
        textEl.innerHTML = q && !isTagSearch && raw.toLowerCase().includes(q) ? highlightText(raw, q) : fmtItemText(raw);
        visibleCount++;
      }
    });
    const bucketTagMatch = !!(q && isTagSearch && bucket && (bucket.tags || []).some(t => t.toLowerCase().includes(tagQ)));
    if (q) {
      const show = visibleCount > 0 || bucketTagMatch;
      card.style.display = show ? '' : 'none';
      if (show) {
        const body = card.querySelector('.bucket-body');
        if (body) body.style.display = '';
        card.classList.remove('collapsed');
        if (bucketTagMatch && visibleCount === 0) {
          card.querySelectorAll('.item-row').forEach(r => r.style.display = '');
        }
      }
    } else {
      card.style.display = '';
    }
  });
}

function setView(view) {
  currentView = view;
  document.getElementById('btn-view-buckets').classList.toggle('active', view === 'buckets');
  document.getElementById('btn-view-priority').classList.toggle('active', view === 'priority');
  document.getElementById('btn-view-timeline').classList.toggle('active', view === 'timeline');
  const cont = document.getElementById('buckets-container');
  if (view === 'timeline') {
    cont.style.maxWidth = 'none';
    cont.style.margin = '0';
    cont.style.padding = '0';
    renderTimelineView();
  } else {
    cont.style.maxWidth = '880px';
    cont.style.margin = '22px auto';
    cont.style.padding = '0 20px 80px';
    if (view === 'buckets') renderAll();
    else renderPriorityView();
  }
}

// ─── Priority View ────────────────────────────────────────────────────────────
function renderPriorityView() {
  const container = document.getElementById('buckets-container');
  container.innerHTML = '';
  if (!buckets.length) { renderAll(); return; }

  const ORDER = ['critical', 'medium', 'low', 'na'];
  const LABEL = { critical: '🔴 Critical', medium: '🟡 Medium', low: '🔵 Low', na: '⬜ N/A' };
  const BORDER = { critical: '#ef4444', medium: '#f59e0b', low: '#3b82f6', na: '#334155' };

  // Flatten all items, attaching bucket title
  const q = searchQuery;
  const isTagSearch = q.startsWith('#');
  const tagQ = isTagSearch ? q.slice(1).toLowerCase() : null;
  const flat = [];
  buckets.forEach(b => b.items.forEach(item => flat.push({ ...item, bucketTitle: b.title })));

  const grouped = {};
  ORDER.forEach(p => grouped[p] = flat.filter(i => {
    if (i.priority !== p) return false;
    if (!q) return true;
    if (isTagSearch) return (i.tags || []).some(t => t.toLowerCase().includes(tagQ));
    return i.text.toLowerCase().includes(q) || (i.tags || []).some(t => t.toLowerCase().includes(q));
  }));

  ORDER.forEach(p => {
    const items = grouped[p];
    if (!items.length) return;

    const group = document.createElement('div');
    group.className = 'pv-group open';
    group.dataset.pv = p;

    group.innerHTML = `
      <div class="pv-group-header" style="border-left:4px solid ${BORDER[p]}" onclick="this.parentElement.classList.toggle('open')">
        <span class="pv-group-title">${LABEL[p]}</span>
        <span class="pv-group-count">${items.length}</span>
        <span class="pv-group-chevron">▶</span>
      </div>
      <div class="pv-items">
        ${items.map(item => `
          <div class="pv-item${item.priority === 'na' ? ' na-item' : ''}">
            <span class="pv-item-text">${q && !isTagSearch && item.text.toLowerCase().includes(q) ? highlightText(item.text, q) : fmtItemText(item.text)}</span>
            ${item.tags && item.tags.length ? `<span class="pv-item-tags">${item.tags.map(t => `<span class="tag-chip" data-tag="${esc(t)}" onclick="onTagChipClick(this)">#${esc(t)}</span>`).join('')}</span>` : ''}
            <span class="pv-bucket-tag">${esc(item.bucketTitle)}</span>
          </div>`).join('')}
      </div>`;

    container.appendChild(group);
  });
}

// ─── Initial Render ───────────────────────────────────────────────────────────
function renderAll() {
  const container = document.getElementById('buckets-container');
  container.innerHTML = '';
  if (!buckets.length) {
    container.innerHTML = `<div style="text-align:center;padding:80px 20px;color:#334155;">
      <div style="font-size:2.5rem;margin-bottom:16px">📂</div>
      <div style="font-size:1rem;font-weight:600;color:#475569;margin-bottom:8px">No backlog loaded</div>
      <div style="font-size:0.82rem;color:#334155">Click <strong style="color:#60a5fa">📂 Load</strong> to open a markdown file</div>
    </div>`;
    return;
  }
  buckets.forEach((b, i) => container.appendChild(createBucketCard(b, i)));
  initSortables();
  if (searchQuery) applyBucketSearch();
}

function createBucketCard(bucket, idx) {
  const card = document.createElement('div');
  card.className = `bucket-card priority-${bucket.priority}${bucket.expanded ? ' expanded' : ''}`;
  card.dataset.id = bucket.id;

  card.innerHTML = `
    <div class="bucket-header">
      <span class="bucket-drag-handle" title="Drag to reorder">⠿</span>
      <span class="bucket-number">#${idx + 1}</span>
      <select class="priority-select" title="Change priority">
        <option value="critical" ${bucket.priority === 'critical' ? 'selected' : ''}>🔴 Critical</option>
        <option value="medium"   ${bucket.priority === 'medium'   ? 'selected' : ''}>🟡 Medium</option>
        <option value="low"      ${bucket.priority === 'low'      ? 'selected' : ''}>🔵 Low</option>
      </select>
      <span class="bucket-title" title="Click ✏ or double-click to rename">${esc(bucket.title)}</span>
      <div class="bucket-tags" data-owner="${bucket.id}">${tagsInnerHTML(bucket.tags, 'bucket', bucket.id)}</div>
      <button class="rename-bucket-btn" title="Rename bucket">✏</button>
      <span class="item-count-badge">${bucket.items.length}</span>
      <button class="delete-bucket-btn" title="Delete bucket">🗑</button>
      <span class="chevron">▶</span>
    </div>
    <div class="bucket-body">
      <ul class="items-list" data-bucket-id="${bucket.id}">
        ${bucket.items.map(makeItemLI).join('')}
      </ul>
      <div class="add-item-area">
        <input type="text" class="add-item-input" placeholder="New item — press Enter or click Add">
        <button class="add-item-btn">＋ Add</button>
      </div>
    </div>
  `;

  // header: toggle on click (except interactive controls)
  card.querySelector('.bucket-header').addEventListener('click', (e) => {
    if (e.target.closest('.priority-select, .delete-bucket-btn, .rename-bucket-btn, .bucket-drag-handle, .bucket-tags, input, button')) return;
    toggleBucket(bucket.id);
  });

  // priority change
  card.querySelector('.priority-select').addEventListener('change', (e) => {
    changePriority(bucket.id, e.target.value);
    e.stopPropagation();
  });

  // rename bucket button
  card.querySelector('.rename-bucket-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    editBucketTitle(bucket.id);
  });

  // rename title on double-click
  card.querySelector('.bucket-title').addEventListener('dblclick', (e) => {
    e.stopPropagation();
    editBucketTitle(bucket.id);
  });

  // delete bucket
  card.querySelector('.delete-bucket-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    if (confirm(`Delete bucket "${bucket.title}"?\nThis cannot be undone.`)) deleteBucket(bucket.id);
  });

  // item actions
  wireItemEvents(card, bucket.id);

  // add item
  const input = card.querySelector('.add-item-input');
  card.querySelector('.add-item-btn').addEventListener('click', () => {
    const t = input.value.trim();
    if (t) { addItem(bucket.id, t); input.value = ''; } else input.focus();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && input.value.trim()) {
      addItem(bucket.id, input.value.trim());
      input.value = '';
    }
  });

  return card;
}

function makeItemLI(item) {
  const p = item.priority || 'medium';
  const naClass = p === 'na' ? ' na-item' : '';
  return `
    <li class="item-row${naClass}" data-id="${item.id}">
      <span class="item-drag-handle" title="Drag to reorder">⠿</span>
      <select class="item-priority-select" data-item-id="${item.id}" title="Item priority">
        <option value="critical" ${p === 'critical' ? 'selected' : ''}>🔴 Critical</option>
        <option value="medium"   ${p === 'medium'   ? 'selected' : ''}>🟡 Medium</option>
        <option value="low"      ${p === 'low'      ? 'selected' : ''}>🔵 Low</option>
        <option value="na"       ${p === 'na'       ? 'selected' : ''}>⬜ N/A</option>
      </select>
      <span class="item-text" data-item-id="${item.id}">${fmtItemText(item.text)}</span>
      <div class="item-tags" data-owner="${item.id}">${tagsInnerHTML(item.tags, 'item', item.id)}</div>
      <div class="item-actions">
        <button class="item-edit-btn"   data-item-id="${item.id}" title="Edit (or double-click)">✎</button>
        <button class="delete-item-btn" data-item-id="${item.id}" title="Delete">✕</button>
      </div>
    </li>`;
}

function wireItemEvents(card, bucketId) {
  card.querySelectorAll('.delete-item-btn').forEach(btn =>
    btn.addEventListener('click', () => deleteItem(bucketId, btn.dataset.itemId)));
  card.querySelectorAll('.item-edit-btn').forEach(btn =>
    btn.addEventListener('click', () => editItem(bucketId, btn.dataset.itemId)));
  card.querySelectorAll('.item-text').forEach(span =>
    span.addEventListener('dblclick', () => editItem(bucketId, span.dataset.itemId)));
  card.querySelectorAll('.item-priority-select').forEach(sel =>
    sel.addEventListener('change', () => {
      const b = getBucket(bucketId);
      const item = b && b.items.find(i => i.id === sel.dataset.itemId);
      if (item) {
        item.priority = sel.value;
        sel.closest('.item-row').classList.toggle('na-item', sel.value === 'na');
      }
    }));
}

// ─── Sortables ────────────────────────────────────────────────────────────────
let _bucketSort = null;
const _itemSorts = new Map();

function initSortables() {
  const container = document.getElementById('buckets-container');
  if (_bucketSort) _bucketSort.destroy();
  _bucketSort = Sortable.create(container, {
    handle: '.bucket-drag-handle',
    animation: 200,
    ghostClass: 'sortable-ghost',
    dragClass: 'sortable-drag',
    onEnd(e) {
      if (e.oldIndex !== e.newIndex) {
        const [m] = buckets.splice(e.oldIndex, 1);
        buckets.splice(e.newIndex, 0, m);
        updateNumbers();
      }
    }
  });
  initItemSortables();
}

function makeItemSortable(list) {
  const bid = list.dataset.bucketId;
  if (_itemSorts.has(bid)) _itemSorts.get(bid).destroy();
  const s = Sortable.create(list, {
    group: 'shared-items',
    handle: '.item-drag-handle',
    animation: 150,
    ghostClass: 'sortable-ghost',
    onEnd(e) {
      const fromId = e.from.dataset.bucketId;
      const toId   = e.to.dataset.bucketId;
      const fromB  = getBucket(fromId);
      const toB    = getBucket(toId);
      if (!fromB || !toB) return;

      if (fromId === toId) {
        // same bucket reorder
        if (e.oldIndex !== e.newIndex) {
          const [m] = fromB.items.splice(e.oldIndex, 1);
          fromB.items.splice(e.newIndex, 0, m);
        }
      } else {
        // cross-bucket move — move item in data model
        const [m] = fromB.items.splice(e.oldIndex, 1);
        toB.items.splice(e.newIndex, 0, m);
        // re-wire action buttons on the moved <li> so its bucketId is correct
        const li = e.item;
        const itemId = li.dataset.id;
        li.querySelector('.delete-item-btn').onclick = () => deleteItem(toId, itemId);
        li.querySelector('.item-edit-btn').onclick   = () => editItem(toId, itemId);
        li.querySelector('.item-text').ondblclick    = () => editItem(toId, itemId);
        li.querySelector('.item-priority-select').onchange = (e) => {
          const bTo = getBucket(toId);
          const itm = bTo && bTo.items.find(i => i.id === itemId);
          if (itm) {
            itm.priority = e.target.value;
            li.classList.toggle('na-item', e.target.value === 'na');
          }
        };
        // update count badges
        updateCount(fromId);
        updateCount(toId);
      }
    }
  });
  _itemSorts.set(bid, s);
  return s;
}

function initItemSortables() {
  document.querySelectorAll('.items-list').forEach(list => makeItemSortable(list));
}

function updateNumbers() {
  document.querySelectorAll('.bucket-card').forEach((card, i) => {
    card.querySelector('.bucket-number').textContent = `#${i + 1}`;
  });
}

// ─── Bucket Actions ───────────────────────────────────────────────────────────
function expandAll() {
  if (currentView === 'priority') {
    document.querySelectorAll('.pv-group').forEach(g => g.classList.add('open'));
  } else {
    buckets.forEach(b => { b.expanded = true; getCard(b.id)?.classList.add('expanded'); });
  }
}

function collapseAll() {
  if (currentView === 'priority') {
    document.querySelectorAll('.pv-group').forEach(g => g.classList.remove('open'));
  } else {
    buckets.forEach(b => { b.expanded = false; getCard(b.id)?.classList.remove('expanded'); });
  }
}

function toggleBucket(id) {
  const b = getBucket(id);
  if (!b) return;
  b.expanded = !b.expanded;
  getCard(id).classList.toggle('expanded', b.expanded);
}

function changePriority(id, priority) {
  const b = getBucket(id);
  if (!b) return;
  b.priority = priority;
  const card = getCard(id);
  card.classList.remove('priority-critical', 'priority-medium', 'priority-low');
  card.classList.add('priority-' + priority);
}

function deleteBucket(id) {
  const idx = buckets.findIndex(b => b.id === id);
  if (idx === -1) return;
  buckets.splice(idx, 1);
  const card = getCard(id);
  card.style.transition = 'all 0.2s';
  card.style.opacity = '0';
  card.style.marginBottom = '0';
  card.style.maxHeight = '0';
  setTimeout(() => { card.remove(); updateNumbers(); }, 210);
  showToast('Bucket deleted');
}

function addBucket() {
  const b = { id: uid(), priority: 'medium', expanded: true, title: 'New Bucket', items: [], tags: [] };
  buckets.push(b);
  const card = createBucketCard(b, buckets.length - 1);
  document.getElementById('buckets-container').appendChild(card);
  // wire item sortable for new bucket
  const list = card.querySelector('.items-list');
  makeItemSortable(list);
  updateNumbers();
  setTimeout(() => editBucketTitle(b.id), 60);
}

function editBucketTitle(id) {
  const b = getBucket(id);
  if (!b) return;
  const card = getCard(id);
  const span = card.querySelector('.bucket-title');
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'bucket-title-input';
  input.value = b.title;
  span.replaceWith(input);
  input.focus(); input.select();
  const save = () => {
    b.title = input.value.trim() || b.title;
    const s = document.createElement('span');
    s.className = 'bucket-title'; s.title = 'Double-click to rename'; s.textContent = b.title;
    s.addEventListener('dblclick', (e) => { e.stopPropagation(); editBucketTitle(id); });
    input.replaceWith(s);
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') save();
    if (e.key === 'Escape') {
      const s = document.createElement('span');
      s.className = 'bucket-title'; s.title = 'Double-click to rename'; s.textContent = b.title;
      s.addEventListener('dblclick', (e2) => { e2.stopPropagation(); editBucketTitle(id); });
      input.replaceWith(s);
    }
  });
}

// ─── Item Actions ─────────────────────────────────────────────────────────────
function addItem(bucketId, text, priority = 'medium') {
  const b = getBucket(bucketId);
  if (!b) return;
  const item = { id: uid(), text, priority, tags: [] };
  b.items.push(item);
  const card = getCard(bucketId);
  const list = card.querySelector('.items-list');
  const li = document.createElement('li');
  li.className = 'item-row'; li.dataset.id = item.id;
  li.innerHTML = `
    <span class="item-drag-handle" title="Drag to reorder">⠿</span>
    <select class="item-priority-select" data-item-id="${item.id}" title="Item priority">
      <option value="critical">🔴 Critical</option>
      <option value="medium" selected>🟡 Medium</option>
      <option value="low">🔵 Low</option>
      <option value="na">⬜ N/A</option>
    </select>
    <span class="item-text" data-item-id="${item.id}">${fmtItemText(item.text)}</span>
    <div class="item-tags" data-owner="${item.id}">${tagsInnerHTML([], 'item', item.id)}</div>
    <div class="item-actions">
      <button class="item-edit-btn"   data-item-id="${item.id}" title="Edit">✎</button>
      <button class="delete-item-btn" data-item-id="${item.id}" title="Delete">✕</button>
    </div>`;
  li.querySelector('.item-priority-select').addEventListener('change', (e) => {
    item.priority = e.target.value;
    li.classList.toggle('na-item', e.target.value === 'na');
  });
  li.querySelector('.delete-item-btn').addEventListener('click', () => deleteItem(bucketId, item.id));
  li.querySelector('.item-edit-btn').addEventListener('click', () => editItem(bucketId, item.id));
  li.querySelector('.item-text').addEventListener('dblclick', () => editItem(bucketId, item.id));
  list.appendChild(li);
  updateCount(bucketId);
}

function deleteItem(bucketId, itemId) {
  const b = getBucket(bucketId);
  if (!b) return;
  const idx = b.items.findIndex(i => i.id === itemId);
  if (idx === -1) return;
  b.items.splice(idx, 1);
  const li = document.querySelector(`.item-row[data-id="${itemId}"]`);
  if (li) {
    li.style.transition = 'all 0.15s';
    li.style.opacity = '0'; li.style.height = '0'; li.style.padding = '0'; li.style.overflow = 'hidden';
    setTimeout(() => li.remove(), 160);
  }
  updateCount(bucketId);
}

function editItem(bucketId, itemId) {
  const b = getBucket(bucketId);
  if (!b) return;
  const item = b.items.find(i => i.id === itemId);
  if (!item) return;
  const li = document.querySelector(`.item-row[data-id="${itemId}"]`);
  const span = li.querySelector('.item-text');
  const ta = document.createElement('textarea');
  ta.className = 'item-text-input';
  ta.value = item.text;
  ta.rows = Math.max(2, Math.ceil(item.text.length / 90));
  span.replaceWith(ta);
  ta.focus();
  const save = () => {
    item.text = ta.value.trim() || item.text;
    const s = document.createElement('span');
    s.className = 'item-text'; s.dataset.itemId = itemId; s.innerHTML = fmtItemText(item.text);
    s.addEventListener('dblclick', () => editItem(bucketId, itemId));
    ta.replaceWith(s);
  };
  ta.addEventListener('blur', save);
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); save(); }
    if (e.key === 'Escape') {
      const s = document.createElement('span');
      s.className = 'item-text'; s.dataset.itemId = itemId; s.innerHTML = fmtItemText(item.text);
      s.addEventListener('dblclick', () => editItem(bucketId, itemId));
      ta.replaceWith(s);
    }
  });
}

function updateCount(bucketId) {
  const b = getBucket(bucketId);
  if (!b) return;
  const badge = getCard(bucketId)?.querySelector('.item-count-badge');
  if (badge) badge.textContent = b.items.length;
}

// ─── Tag Helpers ──────────────────────────────────────────────────────────────
function tagChipHtml(tag, type, ownerId) {
  return `<span class="tag-chip" data-tag="${esc(tag)}" onclick="onTagChipClick(this)">#${esc(tag)}<span class="tag-remove" onclick="event.stopPropagation();onTagRemoveClick('${type}','${ownerId}','${esc(tag)}')">✕</span></span>`;
}
function tagAddBtnHtml(type, ownerId) {
  return `<button class="tag-add-btn" onclick="showTagInput('${type}','${ownerId}',this)" title="Add tag">＋</button>`;
}
function tagsInnerHTML(tags, type, ownerId) {
  const chips = (tags || []).map(t => tagChipHtml(t, type, ownerId)).join('');
  return chips + tagAddBtnHtml(type, ownerId);
}
function onTagChipClick(el) {
  const tag = el.dataset.tag;
  const inp = document.getElementById('searchInput');
  if (inp) { inp.value = '#' + tag; inp.dispatchEvent(new Event('input')); }
}
function onTagRemoveClick(type, ownerId, tag) {
  removeTag(type, ownerId, tag);
}
function showTagInput(type, ownerId, btn) {
  const container = btn.closest('.item-tags, .bucket-tags');
  if (!container) return;
  const existing = container.querySelector('.tag-input-inline');
  if (existing) { existing.focus(); return; }
  const inp = document.createElement('input');
  inp.className = 'tag-input-inline';
  inp.placeholder = 'tag…';
  inp.maxLength = 30;
  inp.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); addTag(type, ownerId, inp.value.trim()); inp.remove(); }
    if (e.key === 'Escape') inp.remove();
  };
  inp.onblur = () => { if (inp.value.trim()) addTag(type, ownerId, inp.value.trim()); inp.remove(); };
  btn.before(inp);
  inp.focus();
}
function addTag(type, ownerId, tag) {
  if (!tag) return;
  tag = tag.replace(/\s+/g, '-').replace(/[^\w\-\.]/g, '');
  if (!tag) return;
  if (type === 'bucket') {
    const b = getBucket(ownerId);
    if (!b) return;
    if (!b.tags) b.tags = [];
    if (!b.tags.includes(tag)) b.tags.push(tag);
    refreshTagsEl('bucket', ownerId, b.tags);
  } else {
    const item = findItemById(ownerId);
    if (!item) return;
    if (!item.tags) item.tags = [];
    if (!item.tags.includes(tag)) item.tags.push(tag);
    refreshTagsEl('item', ownerId, item.tags);
  }
}
function removeTag(type, ownerId, tag) {
  if (type === 'bucket') {
    const b = getBucket(ownerId);
    if (!b || !b.tags) return;
    b.tags = b.tags.filter(t => t !== tag);
    refreshTagsEl('bucket', ownerId, b.tags);
  } else {
    const item = findItemById(ownerId);
    if (!item || !item.tags) return;
    item.tags = item.tags.filter(t => t !== tag);
    refreshTagsEl('item', ownerId, item.tags);
  }
}
function findItemById(id) {
  for (const b of buckets) {
    const item = b.items.find(i => i.id === id);
    if (item) return item;
  }
  return null;
}
function refreshTagsEl(type, ownerId, tags) {
  const el = document.querySelector(`.${type}-tags[data-owner="${ownerId}"]`);
  if (el) el.innerHTML = tagsInnerHTML(tags, type, ownerId);
}

// ─── Timeline View ────────────────────────────────────────────────────────────
function getTagMeta(tag) {
  if (!tagMeta[tag]) tagMeta[tag] = {};
  const m = tagMeta[tag];
  return {
    status:   m.status   || 'planned',
    label:    m.label    !== undefined ? m.label    : tag,
    date:     m.date     || '',
    sublabel: m.sublabel || '',
    colTitle: m.colTitle !== undefined ? m.colTitle : (m.label !== undefined ? m.label : tag),
    order:    m.order    != null ? m.order : null,
  };
}
function setTagMetaField(tag, patch) {
  if (!tagMeta[tag]) tagMeta[tag] = {};
  Object.assign(tagMeta[tag], patch);
}
function parseVersionTag(s) {
  if (/^\d+(\.\d+)+$/.test(s)) return s.split('.').map(Number);
  return null;
}
function sortedTagIds() {
  const seen = new Set();
  buckets.forEach(b => {
    (b.tags || []).forEach(t => seen.add(t));
    b.items.forEach(i => (i.tags || []).forEach(t => seen.add(t)));
  });
  Object.keys(tagMeta).forEach(t => seen.add(t));
  return [...seen].sort((a, b) => {
    const ma = tagMeta[a] || {}, mb = tagMeta[b] || {};
    const oa = ma.order != null ? ma.order : Infinity;
    const ob = mb.order != null ? mb.order : Infinity;
    if (oa !== Infinity || ob !== Infinity) { if (oa !== ob) return oa - ob; }
    const va = parseVersionTag(a), vb = parseVersionTag(b);
    if (va && vb) {
      for (let i = 0; i < Math.max(va.length, vb.length); i++) { const d = (va[i]||0)-(vb[i]||0); if (d) return d; }
      return 0;
    }
    if (va) return -1; if (vb) return 1;
    return a.localeCompare(b);
  });
}
function itemsForTag(tag) {
  const result = [];
  buckets.forEach(b => b.items.forEach(i => {
    if ((i.tags || []).includes(tag)) result.push({ ...i, bucketTitle: b.title });
  }));
  return result;
}
function tlStatusLabel(s) {
  if (s === 'shipped') return '✓ SHIPPED';
  if (s === 'inflight') return '● IN FLIGHT';
  return '○ PLANNED';
}
function cycleStatus(tag) {
  const m = getTagMeta(tag);
  const order = ['planned','inflight','shipped'];
  const next = order[(order.indexOf(m.status) + 1) % 3];
  setTagMetaField(tag, { status: next });
  renderTimelineView();
}
function tlStartInlineEdit(el, currentVal, onSave) {
  const inp = document.createElement('input');
  inp.className = 'tl-meta-inline-input';
  inp.value = currentVal;
  inp.onblur = () => onSave(inp.value.trim());
  inp.onkeydown = e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') { onSave(currentVal); }
  };
  el.replaceWith(inp);
  inp.focus(); inp.select();
}
function editRoadmapTitle(el) {
  const inp = document.createElement('input');
  inp.className = 'tl-title-input';
  inp.value = roadmapTitle;
  inp.onblur = () => { roadmapTitle = inp.value.trim() || roadmapTitle; renderTimelineView(); };
  inp.onkeydown = e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') { roadmapTitle = roadmapTitle; inp.blur(); }
  };
  el.replaceWith(inp);
  inp.focus(); inp.select();
}
function renderTimelineView() {
  const container = document.getElementById('buckets-container');
  container.innerHTML = '';
  const tags = sortedTagIds();
  const view = document.createElement('div');
  view.className = 'tl-view';

  // Title
  const titleEl = document.createElement('div');
  titleEl.className = 'tl-title-h2';
  titleEl.title = 'Click to edit title';
  titleEl.innerHTML = `<strong>${esc(roadmapTitle)}</strong> <span class="tl-t-light">Roadmap</span>`;
  titleEl.onclick = () => editRoadmapTitle(titleEl);
  view.appendChild(titleEl);

  if (!tags.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'color:#2a3f5e;text-align:center;padding:80px 0;font-size:1rem;';
    empty.innerHTML = 'No tags yet.<br><span style="font-size:0.85rem;color:#1e3a5f">Add <code style="color:#38bdf8;background:rgba(56,189,248,0.08);padding:1px 5px;border-radius:3px;">[version]</code> tags to items in the Buckets view to build your roadmap.</span>';
    view.appendChild(empty);
    container.appendChild(view);
    return;
  }

  const scrollWrap = document.createElement('div');
  scrollWrap.className = 'tl-scroll-wrap';
  const colsRow = document.createElement('div');
  colsRow.className = 'tl-cols-row';

  tags.forEach(tag => {
    const m = getTagMeta(tag);
    const s = m.status;
    const unit = document.createElement('div');
    unit.className = 'tl-col-unit';

    // ── Milestone header ──
    const msHeader = document.createElement('div');
    msHeader.className = 'tl-ms-header';

    const msMeta = document.createElement('div');
    msMeta.className = 'tl-ms-meta';

    const msVersion = document.createElement('span');
    msVersion.className = 'tl-ms-version';
    msVersion.textContent = m.label || tag;
    msVersion.title = 'Click to rename version/name';
    msVersion.onclick = e => { e.stopPropagation(); tlStartInlineEdit(msVersion, m.label || tag, v => { setTagMetaField(tag, {label: v || tag}); renderTimelineView(); }); };

    const msDate = document.createElement('span');
    msDate.className = 'tl-ms-date' + (s === 'shipped' ? ' shipped' : '');
    if (m.date) {
      msDate.textContent = m.date;
    } else {
      msDate.textContent = 'Set date…';
      msDate.style.opacity = '0.3'; msDate.style.fontStyle = 'italic';
    }
    msDate.title = 'Click to edit date (e.g. April 2026)';
    msDate.onclick = e => { e.stopPropagation(); tlStartInlineEdit(msDate, m.date || '', v => { setTagMetaField(tag, {date: v}); renderTimelineView(); }); };

    msMeta.appendChild(msVersion);
    msMeta.appendChild(msDate);
    msHeader.appendChild(msMeta);

    const dotRow = document.createElement('div');
    dotRow.className = 'tl-dot-row';
    const dot = document.createElement('div');
    dot.className = 'tl-dot ' + s;
    dot.title = 'Click to cycle: planned → in flight → shipped';
    dot.onclick = () => cycleStatus(tag);
    dotRow.appendChild(dot);
    msHeader.appendChild(dotRow);

    const msLabel = document.createElement('div');
    msLabel.className = 'tl-ms-label' + (s === 'shipped' ? ' shipped' : s === 'inflight' ? ' inflight' : '');
    if (m.sublabel) {
      msLabel.textContent = m.sublabel;
    } else {
      msLabel.textContent = 'Set label…';
      msLabel.style.opacity = '0.2'; msLabel.style.fontStyle = 'italic';
    }
    msLabel.title = 'Click to set milestone label';
    msLabel.onclick = e => { e.stopPropagation(); tlStartInlineEdit(msLabel, m.sublabel || '', v => { setTagMetaField(tag, {sublabel: v}); renderTimelineView(); }); };
    msHeader.appendChild(msLabel);

    const ptr = document.createElement('div');
    ptr.className = 'tl-pointer' + (s === 'shipped' ? ' shipped' : s === 'planned' ? ' planned' : '');
    msHeader.appendChild(ptr);

    unit.appendChild(msHeader);

    // ── Column card ──
    const card = document.createElement('div');
    card.className = 'tl-card ' + s;

    const badge = document.createElement('div');
    badge.className = 'tl-badge ' + s;
    badge.textContent = tlStatusLabel(s);
    badge.title = 'Click to cycle status';
    badge.onclick = () => cycleStatus(tag);
    card.appendChild(badge);

    const cardTitle = document.createElement('div');
    cardTitle.className = 'tl-card-title';
    cardTitle.textContent = m.colTitle || m.label || tag;
    cardTitle.title = 'Click to edit column title';
    cardTitle.onclick = e => { e.stopPropagation(); tlStartInlineEdit(cardTitle, m.colTitle || m.label || tag, v => { setTagMetaField(tag, {colTitle: v}); renderTimelineView(); }); };
    card.appendChild(cardTitle);

    const divider = document.createElement('div');
    divider.className = 'tl-card-divider ' + s;
    card.appendChild(divider);

    const items = itemsForTag(tag);
    if (items.length) {
      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'tl-item';

        } else if (item.priority === 'critical') {
          icon = '›'; iconClass = 'go'; textClass = 'bold';
        } else if (item.priority === 'low') {
          icon = '›'; iconClass = 'soft'; textClass = 'dim';
        } else {
          icon = '›'; iconClass = 'soft'; textClass = '';
        }
        row.innerHTML = `<span class="tl-icon ${iconClass}">${icon}</span><span class="tl-itext ${textClass}">${esc(item.text)}<span class="tl-ibucket">${esc(item.bucketTitle)}</span></span>`;
        card.appendChild(row);
      });
    } else {
      const empty = document.createElement('div');
      empty.className = 'tl-empty';

  // Add-milestone placeholder
  const addUnit = document.createElement('div');
  addUnit.className = 'tl-add-ms';

  addBtn.innerHTML = '＋<br><span style="font-size:0.68rem;opacity:0.5">Tag items in<br>Buckets view</span>';
  addBtn.title = 'Switch to Buckets view to tag items';
  addBtn.onclick = () => setView('buckets');
  addUnit.appendChild(addBtn);
  colsRow.appendChild(addUnit);

  scrollWrap.appendChild(colsRow);
  view.appendChild(scrollWrap);
  container.appendChild(view);

// ─── Markdown Export ──────────────────────────────────────────────────────────
function generateMarkdown() {
  const label = { critical: '🔴 CRITICAL PRIORITY', medium: '🟡 MEDIUM PRIORITY', low: '🔵 LOW PRIORITY' };
  const emoji = { critical: '🔴', medium: '🟡', low: '🔵' };
  const now = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
  const lines = [
    '# Backlog Editor',
    `**Updated: ${now}**`,
    '',
    '---',
    '',
  ];
  const ie = { critical: '🔴', medium: '🟡', low: '🔵', na: '⬜' };
  function tagsStr(tags) {
    if (!tags || !tags.length) return '';
    return ' ' + tags.map(t => `[${t}]`).join('');
  }
  buckets.forEach((b, i) => {
    lines.push(`## ${emoji[b.priority]} BUCKET ${i + 1}: ${b.title}${tagsStr(b.tags)}`);
    lines.push('');
    if (b.items.length === 0) {
      lines.push('*No items*');
    } else {
      b.items.forEach(item => lines.push(`- ${ie[item.priority || 'medium']} ${item.text}${tagsStr(item.tags)}`));
    }
    lines.push('');
    lines.push('---');
    lines.push('');
  });
  // Serialize tag metadata for timeline view
  const metaObj = { _title: roadmapTitle };
  Object.entries(tagMeta).forEach(([k, v]) => { metaObj[k] = v; });
  if (Object.keys(tagMeta).length || roadmapTitle !== 'Backlog') {
    lines.push('');
    lines.push(`<!-- tag-meta: ${JSON.stringify(metaObj)} -->`);
  }
  return lines.join('\n');
}

let _loadedFileHandle = null;
let _loadedFileName   = 'backlog.md';

async function saveAsMarkdown() {
  const md = generateMarkdown();
  if (window.showSaveFilePicker) {
    try {
      if (_loadedFileHandle) {
        const w = await _loadedFileHandle.createWritable();
        await w.write(md); await w.close();
        showToast(`✓ Saved to ${_loadedFileName}`);
        return;
      }
      const handle = await window.showSaveFilePicker({
        suggestedName: _loadedFileName,
        types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'], 'text/plain': ['.md'] } }]
      });
      const w = await handle.createWritable();
      await w.write(md); await w.close();
      _loadedFileHandle = handle;
      _loadedFileName   = handle.name;
      showToast(`✓ Saved to ${handle.name}`);
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = _loadedFileName;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ Downloaded!');
}

async function saveAsNewFile() {
  if (!window.showSaveFilePicker) { saveAsMarkdown(); return; }
  const md = generateMarkdown();
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: _loadedFileName,
      types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'], 'text/plain': ['.md'] } }]
    });
    const w = await handle.createWritable();
    await w.write(md); await w.close();
    _loadedFileHandle = handle;
    _loadedFileName   = handle.name;
    showToast(`✓ Saved to ${handle.name}`);
  } catch (e) { /* cancelled */ }
}

async function loadMarkdownFile() {
  try {
    let file, handle;
    if (window.showOpenFilePicker) {
      [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'], 'text/plain': ['.md', '.txt'] } }]
      });
      file = await handle.getFile();
    } else {
      // Fallback for browsers without File System Access API
      file = await new Promise((resolve) => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.md,.txt';
        input.onchange = (e) => resolve(e.target.files[0]);
        input.click();
      });
      if (!file) return;
    }
    const text = await file.text();
    const parsed = parseMarkdown(text);
    if (!parsed.length) { showToast('⚠ No buckets found in file'); return; }
    if (buckets.length && !confirm(`Load "${file.name}"?\nThis will replace the current ${buckets.length} bucket(s) with ${parsed.length} bucket(s).`)) return;
    buckets = parsed;
    _loadedFileName   = file.name;
    _loadedFileHandle = handle || null;
    renderAll();
    document.getElementById('editor-subtitle').textContent = `Loaded: ${file.name}`;
    showToast(`✓ Loaded ${parsed.length} buckets`);
  } catch (e) {
    if (e.name !== 'AbortError') showToast('⚠ Could not load file');
  }
}

function extractTags(str) {
  const m = str.match(/^(.*?)(\s*(?:\[[^\]]+\])+)\s*$/);
  if (!m) return { text: str.trim(), tags: [] };
  const text = m[1].trim();
  const tagStr = m[2];
  const tags = [];
  let t;
  const re = /\[([^\]]+)\]/g;
  while ((t = re.exec(tagStr)) !== null) tags.push(t[1]);
  return { text, tags };
}

function parseMarkdown(text) {
  // Extract and restore tag metadata (timeline view)
  const metaMatch = text.match(/<!--\s*tag-meta:\s*(\{[\s\S]*?\})\s*-->/);
  if (metaMatch) {
    try {
      const m = JSON.parse(metaMatch[1]);
      if (m._title) roadmapTitle = m._title;
      tagMeta = {};
      Object.entries(m).forEach(([k, v]) => { if (k !== '_title') tagMeta[k] = v; });
    } catch(e) {}
    text = text.replace(/<!--\s*tag-meta:[\s\S]*?-->/, '');
  }
  const lines = text.split('\n');
  const result = [];
  let current = null;

  const priorityMap = {
    '🔴': 'critical', 'CRITICAL': 'critical',
    '🟡': 'medium',   'MEDIUM': 'medium',
    '🟢': 'low',      '🔵': 'low',      'LOW': 'low'
  };

  function detectPriority(line) {
    if (line.includes('🔴') || /CRITICAL/i.test(line)) return 'critical';
    if (line.includes('🟢') || line.includes('🔵') || /LOW/i.test(line)) return 'low';
    return 'medium';
  }

  for (const raw of lines) {
    const line = raw.trim();

    // Bucket heading: ## ... BUCKET N: Title — PRIORITY  OR  ## Title
    if (line.startsWith('## ')) {
      if (current) result.push(current);
      let title = line.replace(/^##\s+/, '');
      // Strip leading emoji (any Unicode emoji / symbol chars) and non-word chars
      title = title.replace(/^[\p{Emoji}\p{S}\p{So}]+\s*/u, '');
      // Also nuke any remaining leading non-alphanumeric junk (rendering artifacts like ◆ ◇ ▶)
      title = title.replace(/^[^\p{L}\p{N}]+/u, '').trim();
      // Strip "BUCKET N: " prefix
      title = title.replace(/^BUCKET\s+\d+:\s*/i, '');
      // Strip trailing " — PRIORITY LABEL" (handles —, –, -)
      title = title.replace(/\s*[—–\-]\s*(?:🔴|🟡|🟢|🔵)?\s*(?:CRITICAL|MEDIUM|LOW)?\s*(?:PRIORITY)?$/i, '').trim();
      const { text: bucketTitle, tags: bucketTags } = extractTags(title);
      current = { id: uid(), priority: detectPriority(line), expanded: false, title: bucketTitle, items: [], tags: bucketTags };
      continue;
    }

    if (!current) continue;

    // Item bullet
    if (line.startsWith('- ') || line.startsWith('* ')) {
      let text = line.slice(2).trim();
      let itemPriority = 'medium';
      if (text.startsWith('🔴 '))      { itemPriority = 'critical'; text = text.slice('🔴 '.length); }
      else if (text.startsWith('🟡 ')) { itemPriority = 'medium';   text = text.slice('🟡 '.length); }
      else if (text.startsWith('🟢 ')) { itemPriority = 'low';      text = text.slice('🟢 '.length); }
      else if (text.startsWith('🔵 ')) { itemPriority = 'low';      text = text.slice('🔵 '.length); }
      else if (text.startsWith('⬜ ')) { itemPriority = 'na';       text = text.slice('⬜ '.length); }
      const { text: itemText, tags: itemTags } = extractTags(text);
      current.items.push({ id: uid(), text: itemText, priority: itemPriority, tags: itemTags });
      continue;
    }
  }
  if (current) result.push(current);
  return result;
}
